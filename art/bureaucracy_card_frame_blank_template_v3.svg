<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncR type="linear" slope="0.97" intercept="0.03"/>
        <feFuncG type="linear" slope="0.95" intercept="0.03"/>
        <feFuncB type="linear" slope="0.88" intercept="0.02"/>
      </feComponentTransfer>
    </filter>

    <filter id="stamp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <linearGradient id="folderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="40%" stop-color="#c9a97a"/>
      <stop offset="100%" stop-color="#b8955e"/>
    </linearGradient>

    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#cba978"/>
      <stop offset="100%" stop-color="#bb9560"/>
    </linearGradient>

    <linearGradient id="artGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5b5"/>
      <stop offset="100%" stop-color="#ddc89f"/>
    </linearGradient>
  </defs>

  <!-- Card shadow -->
  <rect x="4" y="4" width="292" height="446" rx="4" ry="4" fill="#7a5c35" opacity="0.3"/>

  <!-- Folder tab (no text) -->
  <path d="M 10 32 L 10 18 Q 10 10 18 10 L 110 10 Q 120 10 124 18 L 128 32 Z" fill="url(#folderGrad)" stroke="#8a6535" stroke-width="1.5"/>
  <!-- Tab dashed line only, no text -->
  <line x1="20" y1="24" x2="108" y2="24" stroke="#8a6535" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Main card body -->
  <rect x="2" y="30" width="296" height="418" rx="3" ry="3" fill="url(#bodyGrad)" stroke="#8a6535" stroke-width="2" filter="url(#paper)"/>

  <!-- Outer border decorative lines -->
  <rect x="8" y="36" width="284" height="406" rx="2" ry="2" fill="none" stroke="#8a6535" stroke-width="0.8" opacity="0.6"/>
  <rect x="11" y="39" width="278" height="400" rx="1" ry="1" fill="none" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>

  <!-- Header section shading -->
  <rect x="8" y="36" width="284" height="28" rx="2" ry="2" fill="#8a6535" opacity="0.15"/>

  <!-- OFFICIAL CARD line only (kept), centered -->
  <text x="155" y="53" font-family="'Courier New', monospace" font-size="5" fill="#6a4a1a" text-anchor="middle" letter-spacing="1">OFFICIAL CARD — AUTHORIZED USE ONLY</text>

  <!-- Divider lines under header -->
  <line x1="8" y1="64" x2="292" y2="64" stroke="#8a6535" stroke-width="1.2"/>
  <line x1="8" y1="66" x2="292" y2="66" stroke="#8a6535" stroke-width="0.4"/>

  <!-- CLOUT STAMP -->
  <g transform="translate(34, 68)" filter="url(#stamp)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#8b1a1a" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#8b1a1a" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#8b1a1a" stroke-width="1" stroke-dasharray="3,4" opacity="0.6"/>
    
  </g>

  <!-- RARITY / CLASSIFICATION - top right -->
  <g transform="translate(234, 68)">
    <rect x="0" y="0" width="54" height="16" rx="1" fill="none" stroke="#8a6535" stroke-width="0.8"/>
    <text x="27" y="7" font-family="'Courier New', monospace" font-size="4.5" fill="#5a3e1a" text-anchor="middle" letter-spacing="1">CLASSIFICATION</text>
    <line x1="2" y1="9" x2="52" y2="9" stroke="#8a6535" stroke-width="0.5"/>

  </g>

  <!-- Card Name field - no label text, just the box -->
  <rect x="62" y="68" width="166" height="22" rx="1" fill="#e8d5b5" fill-opacity="0.5" stroke="#8a6535" stroke-width="0.8"/>


  <!-- Divider -->
  <line x1="14" y1="97" x2="286" y2="97" stroke="#8a6535" stroke-width="0.8"/>

  <!-- Art area -->
  <rect x="14" y="101" width="272" height="183" rx="1" fill="url(#artGrad)" stroke="#8a6535" stroke-width="1.2"/>
  <!-- Art area inner dashed border -->
  <rect x="17" y="104" width="266" height="177" rx="1" fill="none" stroke="#8a6535" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Corner marks on art area -->
  <path d="M 14 109 L 14 101 L 22 101" fill="none" stroke="#8a6535" stroke-width="1.5"/>
  <path d="M 286 109 L 286 101 L 278 101" fill="none" stroke="#8a6535" stroke-width="1.5"/>
  <path d="M 14 276 L 14 284 L 22 284" fill="none" stroke="#8a6535" stroke-width="1.5"/>
  <path d="M 286 276 L 286 284 L 278 284" fill="none" stroke="#8a6535" stroke-width="1.5"/>

  <!-- Divider below art -->
  <line x1="14" y1="288" x2="286" y2="288" stroke="#8a6535" stroke-width="1.2"/>
  <line x1="14" y1="290" x2="286" y2="290" stroke="#8a6535" stroke-width="0.4"/>

  <!-- Card type field - no label text -->
  <rect x="14" y="294" width="180" height="14" rx="1" fill="none" stroke="#8a6535" stroke-width="0.6"/>


  <!-- Dept field - no label text -->
  <rect x="200" y="294" width="86" height="14" rx="1" fill="none" stroke="#8a6535" stroke-width="0.6"/>


  <!-- Divider -->
  <line x1="14" y1="312" x2="286" y2="312" stroke="#8a6535" stroke-width="0.8"/>

  <!-- Effect text box -->
  <rect x="14" y="316" width="272" height="90" rx="1" fill="#e8d5b5" fill-opacity="0.3" stroke="#8a6535" stroke-width="0.8"/>

  <!-- Ruled lines in text area -->
  <line x1="18" y1="326" x2="282" y2="326" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="336" x2="282" y2="336" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="346" x2="282" y2="346" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="356" x2="282" y2="356" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="366" x2="282" y2="366" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="376" x2="282" y2="376" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>
  <line x1="18" y1="386" x2="282" y2="386" stroke="#8a6535" stroke-width="0.4" opacity="0.4"/>

  <!-- Flavor text divider -->
  <line x1="18" y1="378" x2="282" y2="378" stroke="#8a6535" stroke-width="0.6" stroke-dasharray="4,3"/>

  <!-- Bottom bar -->
  <line x1="8" y1="410" x2="292" y2="410" stroke="#8a6535" stroke-width="1"/>



</svg>
